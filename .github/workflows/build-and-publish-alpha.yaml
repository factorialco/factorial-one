name: Build and Publish [ALPHA]

on:
  issue_comment:
    types: [ created ]
  pull_request:
    types: [ opened, synchronize ]

jobs:
  publish-alpha:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, 'build')) ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-node-pnpm
        name: Setup Node and pnpm

      - name: Build
        run: pnpm build

      #      - name: Create new version
      #        run: |
      #          # Get lastest version from  package.json
      #          CURRENT_VERSION=$(node -p "require('./package.json').version")
      #          PR_NUMBER=${{ github.event.pull_request.number }}
      #          COMMIT_SHA=$(git rev-parse --short ${{ github.sha }})
      #
      #          # Create alpha version
      #          ALPHA_VERSION="${CURRENT_VERSION}-alpha.pr-${PR_NUMBER}-$(date +%Y%m%d%H%M%S)-${COMMIT_SHA}"
      #
      #          # Update package.json version
      #          pnpm version $ALPHA_VERSION --no-git-tag-version

      #      - uses: stefanzweifel/git-auto-commit-action@v5
      #        with:
      #          commit_message: Release alpha version PR-${{ github.event.pull_request.number }}
      #          branch: 'npm/alpha-pr-${{ github.event.pull_request.number }}'
      #          create_branch: true
      #          push_options: "--force"

      - name: Publish to release branch npm/alpha-pr-${{ github.event.pull_request.number }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Publish alpha version
          pnpx git-publish -b 'npm/alpha-pr-${{ github.event.pull_request.number }}'
